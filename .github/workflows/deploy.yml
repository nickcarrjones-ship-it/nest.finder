name: Deploy NestFinder to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure client for production (proxy URL only; no API key in bundle)
        run: |
          sed -i 's|%%ANTHROPIC_API_KEY%%||g' js/config.js
          sed -i 's|%%ANTHROPIC_PROXY_URL%%|https://europe-west1-nestfinderv3.cloudfunctions.net/anthropicMessages|g' js/config.js

      - name: Install Firebase CLI and deploy Cloud Function
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          cd functions && npm install && cd ..
          firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project nestfinderv3 --non-interactive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
