name: Deploy NestFinder to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy Firebase function with API key
        id: firebase-deploy
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > functions/.env
          cd functions && npm install && cd ..
          firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project nestfinderv3 --non-interactive

      - name: Report Firebase deploy result
        run: |
          if [ "${{ steps.firebase-deploy.outcome }}" = "success" ]; then
            echo "Firebase function deployed successfully — AI proxy is active"
          else
            echo "WARNING: Firebase function deploy FAILED — AI features will not work until fixed"
            echo ""
            echo "Most common causes:"
            echo "  1. Firebase project (nestfinderv3) is on Spark free plan — upgrade to Blaze at console.firebase.google.com"
            echo "  2. FIREBASE_TOKEN secret is expired — run: npx firebase-tools login:ci"
            echo "  3. Billing not set up on the Google Cloud project"
          fi

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
