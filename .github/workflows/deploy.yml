name: Deploy NestFinder to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Inject API key for production (local dev fallback only)
        run: |
          sed -i "s|%%ANTHROPIC_API_KEY%%|${{ secrets.ANTHROPIC_API_KEY }}|g" js/config.js

      - name: Verify key injection
        run: |
          if grep -q '%%ANTHROPIC_API_KEY%%' js/config.js; then
            echo "ERROR: ANTHROPIC_API_KEY placeholder was NOT replaced — check GitHub secret"
            exit 1
          else
            echo "OK: API key placeholder replaced successfully"
          fi

      - name: Deploy Firebase function with API key
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > functions/.env
          cd functions && npm install && cd ..
          firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project nestfinderv3 --non-interactive

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
