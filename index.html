<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Maloca</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Landing page specific styles ── */
    body {
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lp-bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--cream-dk) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.6;
    }

    .lp-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lp-wordmark {
      font-size: clamp(42px, 8vw, 76px);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .lp-wordmark-dot { color: var(--copper); font-weight: 500; }

    .lp-tagline {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-ghost);
      margin-bottom: 56px;
    }

    /* Shared button base */
    .lp-enter-btn,
    .lp-secondary-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      width: 280px;
      padding: 16px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      /* Android: eliminates 300ms touch delay and ensures taps register */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Primary — dark fill */
    .lp-enter-btn {
      background: var(--ink);
      color: var(--cream);
      border: none;
    }
    .lp-enter-btn:hover { background: var(--copper); }

    /* Button group */
    .lp-choice { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    /* Secondary — outlined */
    .lp-secondary-btn {
      background: var(--cream-mid);
      color: var(--ink-mid);
      border: 1px solid var(--rule);
    }
    .lp-secondary-btn:hover { background: var(--cream-dk); color: var(--ink); }

    /* Partner button — warm tint to distinguish it */
    .lp-partner-btn {
      background: rgba(200,114,42,0.08);
      color: var(--copper);
      border-color: rgba(200,114,42,0.35);
    }
    .lp-partner-btn:hover { background: rgba(200,114,42,0.16); }

    /* Code entry (revealed after clicking link button) */
    .lp-link-entry {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .lp-code-input {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      padding: 10px 18px;
      border: 1px solid var(--rule);
      border-bottom: 2px solid var(--ink);
      background: #fff;
      width: 180px;
    }
    .lp-link-error { font-size: 11px; color: #991b1b; min-height: 16px; }

    .lp-footer {
      position: fixed;
      bottom: 28px;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-ghost);
    }
  </style>
</head>
<body>

  <div class="lp-bg-grid"></div>

  <div class="lp-content">
    <div class="lp-wordmark">
      Maloca
    </div>
    <div class="lp-tagline">London &middot; House hunting for two</div>

    <div class="lp-choice">
      <button class="lp-enter-btn" onclick="handleReturn()">Get back to it</button>
      <button class="lp-secondary-btn" onclick="handleEnter()">New login</button>
      <button class="lp-secondary-btn lp-partner-btn" onclick="handleLinkPartner()">Link to partner's profile &rarr;</button>
    </div>

    <div class="lp-link-entry" id="lp-link-entry">
      <input id="lp-code-input" class="lp-code-input" type="text" maxlength="6" placeholder="ABC123"
             oninput="this.value = this.value.toUpperCase()" />
      <button class="lp-enter-btn" onclick="submitLinkCode()">Link up</button>
      <div id="lp-link-error" class="lp-link-error"></div>
    </div>
  </div>

  <div class="lp-footer">Your London house hunt starts here</div>

  <!-- Firebase SDKs — same version as map.html -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/profile.js"></script>

  <script>
    var _signedInUser = null;

    // Initialise Firebase with the same config as map.html
    firebase.initializeApp({
      apiKey:            "AIzaSyBPuXJmo0VRWkIJuG53S0oCxOxVjqbJvRs",
      authDomain:        "nestfinderv3.firebaseapp.com",
      databaseURL:       "https://nestfinderv3-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "nestfinderv3",
      storageBucket:     "nestfinderv3.firebasestorage.app",
      messagingSenderId: "462786335336",
      appId:             "1:462786335336:web:bd234a0480ef6d4dd421dd"
    });

    // On page load: if the user is already signed in and has a local profile
    // but Firebase has nothing yet (e.g. profile predates the sync feature),
    // upload it now so other devices can find it.
    firebase.auth().onAuthStateChanged(function(user) {
      if (!user || !ProfileManager.load()) return;
      firebase.database().ref('users/' + user.uid + '/profile').once('value', function(snap) {
        if (!snap.val()) {
          ProfileManager.syncToFirebase(user.uid);
          console.log('[index] Legacy profile uploaded to Firebase for', user.uid);
        }
      });
    });

    // Shared helper: pull profile from Firebase then navigate
    function _goToApp(user, alwaysMap) {
      ProfileManager.loadFromFirebase(user.uid, function(found) {
        if (alwaysMap) {
          window.location.href = 'map.html';
        } else {
          window.location.href = (found || ProfileManager.load()) ? 'map.html' : 'setup.html';
        }
      });
    }

    // "Get back to it" — sign in if needed, load profile from Firebase, then go to map
    function handleReturn() {
      var unsubscribe = firebase.auth().onAuthStateChanged(function(user) {
        unsubscribe();
        if (user) {
          _goToApp(user, true);
        } else {
          signInThen(function(user) { _goToApp(user, true); });
        }
      });
    }

    // "New login" — sign in, load profile from Firebase, go to map or setup
    function handleEnter() {
      signInThen(function(user) { _goToApp(user, false); });
    }

    // "Link to partner's profile" — sign in then reveal code entry
    function handleLinkPartner() {
      signInThen(function() {
        document.getElementById('lp-link-entry').style.display = 'flex';
        document.getElementById('lp-code-input').focus();
      });
    }

    // Google sign-in → call onSuccess when done.
    // Uses popup on all devices — signInWithRedirect breaks on Android Chrome due to
    // cross-origin cookie restrictions between nestfinderv3.firebaseapp.com and maloca.homes.
    // Falls back to redirect only if the browser explicitly blocks the popup.
    function signInThen(onSuccess) {
      var provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          _signedInUser = result.user;
          onSuccess(result.user);
        })
        .catch(function(err) {
          if (err.code === 'auth/popup-blocked') {
            // Genuine popup block — fall back to redirect
            firebase.auth().signInWithRedirect(provider);
          } else if (err.code !== 'auth/popup-closed-by-user') {
            console.error('[index] Sign-in failed:', err);
          }
        });
    }

    // Safety net: complete any in-flight redirect sign-in (e.g. popup-blocked fallback)
    firebase.auth().getRedirectResult().then(function(result) {
      if (result && result.user) {
        _signedInUser = result.user;
        _goToApp(result.user, false);
      }
    }).catch(function(err) {
      console.error('[index] Redirect sign-in failed:', err);
    });

    // Redeem the partner invite code (user is already signed in at this point)
    function submitLinkCode() {
      var code = document.getElementById('lp-code-input').value.trim().toUpperCase();
      var errEl = document.getElementById('lp-link-error');
      errEl.textContent = '';

      if (code.length < 6) {
        errEl.textContent = 'Enter the full 6-character code.';
        return;
      }

      firebase.database().ref('invites/' + code).once('value', function(snap) {
        var invite = snap.val();
        if (!invite) {
          errEl.textContent = 'Code not found. Check it and try again.';
          return;
        }
        if (invite.uid === _signedInUser.uid) {
          errEl.textContent = "That's your own code — share it with your partner!";
          return;
        }

        // Copy partner's profile so this user's map loads with the same settings
        if (invite.profile) ProfileManager.save(invite.profile);

        // Write the couple link to Firebase and remove the used invite
        firebase.database().ref('users/' + _signedInUser.uid + '/linkedTo').set(invite.uid)
          .then(function() {
            return firebase.database().ref('invites/' + code).remove();
          })
          .then(function() {
            window.location.href = 'map.html';
          });
      });
    }
  </script>

</body>
</html>
