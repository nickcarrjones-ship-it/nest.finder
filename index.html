<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>nest.finder</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Landing page specific styles ── */
    body {
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Dotted background grid */
    .lp-bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--cream-dk) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.6;
    }

    /* Centre content block */
    .lp-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Large wordmark */
    .lp-wordmark {
      font-size: clamp(42px, 8vw, 76px);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .lp-wordmark-dot { color: var(--copper); font-weight: 500; }

    /* Tagline */
    .lp-tagline {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-ghost);
      margin-bottom: 56px;
    }

    /* Primary Enter button */
    .lp-enter-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 15px 48px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      transition: background 0.2s, letter-spacing 0.2s;
      position: relative;
    }
    .lp-enter-btn:hover { background: var(--copper); letter-spacing: 0.3em; }

    /* Copper dot below primary button */
    .lp-enter-btn::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--copper);
    }

    /* Two-button choice layout */
    .lp-choice { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    /* Secondary link button */
    .lp-link-btn {
      background: transparent;
      border: none;
      color: var(--ink-ghost);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      cursor: pointer;
      padding: 0;
      margin-top: 4px;
    }
    .lp-link-btn:hover { color: var(--copper); }

    /* Code entry area (shown after clicking link button) */
    .lp-link-entry {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .lp-code-input {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      padding: 10px 18px;
      border: 1px solid var(--rule);
      border-bottom: 2px solid var(--ink);
      background: #fff;
      width: 180px;
    }
    .lp-link-error { font-size: 11px; color: #991b1b; min-height: 16px; }

    /* Bottom credit */
    .lp-footer {
      position: fixed;
      bottom: 28px;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-ghost);
    }
  </style>
</head>
<body>

  <div class="lp-bg-grid"></div>

  <div class="lp-content">
    <div class="lp-wordmark">
      nest<span class="lp-wordmark-dot">.</span>finder
    </div>
    <div class="lp-tagline">London &middot; House hunting for two</div>

    <div class="lp-choice">
      <button class="lp-enter-btn" onclick="handleEnter()">Begin new discovery</button>
      <button class="lp-link-btn" onclick="handleLinkPartner()">Link to partner's profile &rarr;</button>
    </div>

    <div class="lp-link-entry" id="lp-link-entry">
      <input id="lp-code-input" class="lp-code-input" type="text" maxlength="6" placeholder="ABC123"
             oninput="this.value = this.value.toUpperCase()" />
      <button class="lp-enter-btn" onclick="submitLinkCode()">Link up</button>
      <div id="lp-link-error" class="lp-link-error"></div>
    </div>
  </div>

  <div class="lp-footer">Your London house hunt starts here</div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- App config and profile manager -->
  <script src="js/config.js"></script>
  <script src="js/profile.js"></script>

  <script>
    var _signedInUser = null;

    // Initialise Firebase once config is available
    function initFirebase() {
      if (typeof APP_CONFIG !== 'undefined' && APP_CONFIG.firebase && !firebase.apps.length) {
        firebase.initializeApp(APP_CONFIG.firebase);
      }
    }

    // "Begin new discovery" — sign in then go to setup or map
    function handleEnter() {
      initFirebase();
      signInThen(function() {
        window.location.href = ProfileManager.load() ? 'map.html' : 'setup.html';
      });
    }

    // "Link to partner's profile" — sign in then reveal code entry
    function handleLinkPartner() {
      initFirebase();
      signInThen(function() {
        document.getElementById('lp-link-entry').style.display = 'flex';
        document.getElementById('lp-code-input').focus();
      });
    }

    // Fire Google sign-in popup and call onSuccess once authenticated
    function signInThen(onSuccess) {
      var provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(function(result) {
          _signedInUser = result.user;
          onSuccess(_signedInUser);
        })
        .catch(function(err) {
          console.error('[index] Sign-in failed:', err);
        });
    }

    // Redeem the partner invite code (user is already signed in at this point)
    function submitLinkCode() {
      var code = document.getElementById('lp-code-input').value.trim().toUpperCase();
      var errEl = document.getElementById('lp-link-error');
      errEl.textContent = '';

      if (code.length < 6) {
        errEl.textContent = 'Enter the full 6-character code.';
        return;
      }

      firebase.database().ref('invites/' + code).once('value', function(snap) {
        var invite = snap.val();
        if (!invite) {
          errEl.textContent = 'Code not found. Check it and try again.';
          return;
        }
        if (invite.uid === _signedInUser.uid) {
          errEl.textContent = "That's your own code — share it with your partner!";
          return;
        }

        // Copy partner's profile so this user's map loads with the same settings
        if (invite.profile) ProfileManager.save(invite.profile);

        // Write the couple link to Firebase and remove the used invite
        firebase.database().ref('users/' + _signedInUser.uid + '/linkedTo').set(invite.uid)
          .then(function() {
            return firebase.database().ref('invites/' + code).remove();
          })
          .then(function() {
            window.location.href = 'map.html';
          });
      });
    }
  </script>

</body>
</html>
